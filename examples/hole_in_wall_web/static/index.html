<!DOCTYPE html>
<html>

<style>

               display: flex; align-items: center; justify-content: center; }

  #piplabel { position: absolute; top: 134px; right: 16px; color: #8b8b96;
              font: 11px Rubik, sans-serif; z-index: 5; }
  #hint { position: absolute; bottom: 6px; left: 12px; color: #667;
          font: 12px Rubik, sans-serif; z-index: 5; }

<body>
<div id="wrap">
  <img id="pip" alt="">
  <div id="piplabel">camera</div>
  <div id="hint">click for sound &nbsp;|&nbsp; S skip &nbsp;|&nbsp; SPACE restart</div>
</div>
